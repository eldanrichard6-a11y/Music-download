<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Music Store - Download & Pay</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Hizi ni kodi fupi za muonekano (CSS) ili app ipendeze */
        body { font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .search-box { margin-bottom: 30px; }
        input { padding: 12px; width: 70%; border: 1px solid #ddd; border-radius: 5px; }
        button#search-btn { padding: 12px 20px; background: #007bff; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .song-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .song-card img { width: 100%; border-radius: 8px; }
        .download-btn { background: #28a745; color: white; border: none; padding: 10px; width: 100%; border-radius: 5px; margin-top: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <h1>Daniel Music Store 🎵</h1>
        <p>Tafuta na pakua muziki uupendao kwa TZS 500 tu!</p>
    </header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Andika jina la wimbo au msanii...">
        <button id="search-btn" onclick="searchMusic()">Tafuta</button>
    </div>

    <div id="results">
        <p>Andika kitu kuanza kutafuta...</p>
    </div>

    <script src="script.js"></script>
</body>
</html>
