<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Daniel Richard Global Store</title>
    <style>
        body { 
            font-family: 'Courier New', monospace; 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }

        /* Mapambo ya Python (Kisasa) */
        .python-bg {
            position: fixed; top: 10px; left: 10px; font-size: 10px;
            color: rgba(29, 185, 84, 0.15); text-align: left;
            white-space: pre; pointer-events: none; z-index: -1;
        }

        .buy-text { color: #ffc107; font-weight: bold; font-size: 12px; letter-spacing: 4px; display: block; }
        h1 { color: #1DB954; font-size: 3rem; margin: 10px 0; font-weight: 900; }
        .owner { color: #888; font-size: 14px; margin-bottom: 20px; }
        
        .contact-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 30px; }
        .c-btn { 
            text-decoration: none; padding: 12px 25px; border-radius: 30px; 
            font-weight: bold; transition: 0.3s; font-size: 14px;
        }
        .wa { background: #25D366; color: white; }
        .cl { background: #ffc107; color: black; }

        .search-area { margin-bottom: 40px; }
        input { 
            padding: 18px; width: 85%; max-width: 500px; border-radius: 30px; 
            border: 2px solid #1DB954; background: #111; color: white; outline: none;
            font-size: 16px;
        }
        button#search-btn {
            background: #1DB954; color: white; border: none; padding: 15px 30px;
            border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 15px;
        }

        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 25px; }
        .song-card { 
            background: #121212; padding: 20px; border-radius: 20px; 
            border: 1px solid #222; transition: 0.3s;
        }
        .song-card img { width: 100%; border-radius: 15px; height: 200px; object-fit: cover; }
        .song-card h4 { margin: 15px 0 5px; font-size: 16px; }
        .song-card p { font-size: 12px; color: #aaa; margin-bottom: 15px; }

        audio { width: 100%; height: 35px; filter: invert(100%); margin-bottom: 15px; }

        .buy-tzs { background: #1DB954; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .buy-usd { background: #ffc107; color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="python-bg">
import music_engine
import payments

def start_download(track_id):
    if payment_verified == True:
        server.fetch_full_song()

# Daniel Richard Global System
daniel_system = "Active"
    </div>

    <div class="header">
        <span class="buy-text">BUY AND ENJOY FULL SONGS</span>
        <h1>Code Pro</h1>
        <div class="owner">Premium Digital Store by <b>DANIEL RICHARD</b></div>
    </div>

    <div class="contact-box">
        <a href="tel:0621645957" class="c-btn cl">CALL DANIEL</a>
        <a href="https://wa.me/255621645957?text=Habari%20Daniel%20Richard%2C%20nahitaji%20wimbo%20full" class="c-btn wa">WHATSAPP</a>
    </div>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Search millions of songs...">
        <br>
        <button id="search-btn" onclick="tafutaMuziki()">SEARCH GLOBAL MUSIC</button>
    </div>

    <div id="results"></div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Please type a song name!");

            container.innerHTML = "<p style='color:#1DB954'>Accessing global servers...</p>";

            try {
                // Hii ndio inaleta mamilioni ya nyimbo duniani kote
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=40`);
                const data = await response.json();
                container.innerHTML = "";

                if (data.results.length === 0) {
                    container.innerHTML = "<p>No results found. Try again.</p>";
                    return;
                }

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'song-card';
                    const trackName = song.trackName.replace(/'/g, "");
                    
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '600x600')}" alt="cover">
                        <h4>${song.trackName}</h4>
                        <p>${song.artistName}</p>
                        <audio controls>
                            <source src="${song.previewUrl}" type="audio/mpeg">
                        </audio>
                        <button class="buy-tzs" onclick="lipia('${trackName}', 'TZS')">LIPA TZS 13,500</button>
                        <button class="buy-usd" onclick="lipia('${trackName}', 'USD')">PAY $5.00</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { 
                container.innerHTML = "<p>Connection error. Try again.</p>"; 
            }
        }

        function lipia(wimbo, fedha) {
            let instructions = fedha === 'TZS' ? 
                `UNANUNUA: ${wimbo}\n\nLipa TZS 13,500 kwenda:\nNamba: 0621645957\nJina: DANIEL RICHARD\n\nWeka Transaction ID hapa kuanza download:` :
                `BUYING: ${wimbo}\n\nSend $5.00 via WorldRemit to:\nName: DANIEL RICHARD\nNumber: +255621645957\n\nEnter Transaction Reference ID:`;
            
            let id = prompt(instructions);
            if (id && id.length > 5) {
                alert("Asante! Malipo yamethibitishwa na DANIEL RICHARD. Download inaanza sasa!");
                // Hapa itadownload ile preview kwa sasa
                location.reload(); 
            }
        }
    </script>
</body>
</html>
