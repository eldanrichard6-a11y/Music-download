<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daniel Music Store</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #121212; color: white; margin: 0; padding: 20px; text-align: center; }
        .search-box { margin: 20px 0; }
        input { padding: 12px; width: 65%; border-radius: 25px; border: none; outline: none; }
        button#search-btn { padding: 12px 25px; border-radius: 25px; border: none; background-color: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .song-card { background: #1e1e1e; padding: 10px; border-radius: 10px; transition: 0.3s; }
        .song-card img { width: 100%; border-radius: 8px; }
        .song-card h3 { font-size: 14px; margin: 10px 0 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .download-btn { background: #1DB954; color: white; border: none; padding: 8px; width: 100%; border-radius: 20px; font-size: 12px; cursor: pointer; margin-top: 5px; }
    </style>
</head>
<body>

    <h1>Daniel Music Store 🎵</h1>
    
    <div class="search-box">
        <input type="text" id="search-input" placeholder="Tafuta wimbo au msanii...">
        <button id="search-btn" onclick="searchMusic()">Tafuta</button>
    </div>

    <div id="results">
        <p>Andika jina la wimbo kuanza...</p>
    </div>

    <script>
        // KODI YA TAFUTA (SEARCH)
        async function searchMusic() {
            const query = document.getElementById('search-input').value;
            const resultsDiv = document.getElementById('results');
            
            if (!query) {
                alert("Andika jina la wimbo!");
                return;
            }

            resultsDiv.innerHTML = "<p>Inatafuta...</p>";

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=12`);
                const data = await response.json();
                resultsDiv.innerHTML = ""; 

                if (data.results.length === 0) {
                    resultsDiv.innerHTML = "<p>Hatujapata kitu, jaribu tena.</p>";
                    return;
                }

                data.results.forEach(song => {
                    const songCard = document.createElement('div');
                    songCard.className = 'song-card';
                    songCard.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '300x300')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <button class="download-btn" onclick="anzishaMalipo('${song.trackName.replace(/'/g, "")}', '${song.previewUrl}')">
                            Pakua (TZS 500)
                        </button>
                    `;
                    resultsDiv.innerHTML += songCard.outerHTML;
                });
            } catch (error) {
                resultsDiv.innerHTML = "<p>Tatizo la mtandao!</p>";
            }
        }

        // KODI YA MALIPO (PAYMENT)
        function anzishaMalipo(jina, link) {
            const namba = prompt(`Weka namba ya M-PESA/TIGO PESA ili kupakua: ${jina}`);
            if (namba && namba.length >= 10) {
                alert("Ombi la malipo limetumwa kwenye simu yako. Weka PIN kukamilisha.");
                
                // Simulation ya kusubiri malipo
                setTimeout(() => {
                    alert("Malipo yamefanikiwa! Wimbo unaanza kushuka sasa.");
                    window.location.href = link; 
                }, 3000);
            } else if (namba) {
                alert("Namba haina urefu sahihi!");
            }
        }
    </script>
</body>
</html>
