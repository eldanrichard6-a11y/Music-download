<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Daniel Richard Music</title>
    <style>
        /* Modern Matrix Tech Style */
        body { 
            font-family: 'Courier New', monospace; 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
        }

        /* Python Background Decoration */
        .python-bg {
            position: fixed;
            top: 0;
            left: 5px;
            font-size: 10px;
            color: rgba(29, 185, 84, 0.1);
            text-align: left;
            z-index: -1;
            white-space: pre;
            pointer-events: none;
        }

        .header-section { margin-bottom: 30px; }
        .buy-text { color: #ffc107; font-weight: bold; font-size: 12px; letter-spacing: 4px; display: block; margin-bottom: 5px; }
        h1 { color: #1DB954; font-size: 2.8rem; margin: 0; font-weight: 900; }
        
        .contact-box { display: flex; justify-content: center; gap: 20px; margin: 20px 0; }
        .c-btn { 
            text-decoration: none; padding: 12px 20px; border-radius: 30px; 
            font-size: 14px; font-weight: bold; transition: 0.3s;
        }
        .wa { background: #25D366; color: white; }
        .cl { background: #ffc107; color: black; }

        input { 
            padding: 15px; width: 80%; max-width: 400px; border-radius: 25px; 
            border: 1px solid #1DB954; background: #111; color: white; margin-bottom: 20px;
        }
        
        #music-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .song-card { 
            background: #121212; padding: 15px; border-radius: 15px; 
            border: 1px solid #222; transition: 0.3s;
        }
        .song-card:hover { border-color: #1DB954; transform: translateY(-5px); }
        .song-card img { width: 100%; border-radius: 10px; height: 180px; object-fit: cover; }
        
        .buy-tzs { background: #1DB954; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; font-weight: bold; cursor: pointer; }
        .buy-usd { background: #ffc107; color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="python-bg">
import os
def check_payment(id):
    if len(id) > 5:
        return True
    return False

# Daniel Richard System
while True:
    music = "Full Version"
    print("Code Pro Running...")
    </div>

    <div class="header-section">
        <span class="buy-text">BUY AND ENJOY FULL SONGS</span>
        <h1>Code Pro</h1>
        <p style="color: #888; font-size: 12px;">Premium Store by Daniel Richard</p>
    </div>

    <div class="contact-box">
        <a href="tel:0621645957" class="c-btn cl">CALL DANIEL</a>
        <a href="https://wa.me/255621645957?text=Habari%20Daniel%20Richard%2C%20nahitaji%20muziki" class="c-btn wa">WHATSAPP</a>
    </div>

    <input type="text" id="search" placeholder="Tafuta muziki..." onkeyup="filterSongs()">

    <div id="music-grid"></div>

    <script>
        const storeData = [
            { jina: "Migos - Stir Fry", msanii: "Migos", cover: "https://images.alphacoders.com/901/901438.jpg", link: "nyimbo/stir-fry.mp3" },
            { jina: "Diamond - Shu!", msanii: "Diamond", cover: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_xV9D6M9B9X9D6M9B9X9D6M9B9X9D6M9B9X9", link: "nyimbo/diamond.mp3" }
        ];

        function display(list) {
            const grid = document.getElementById('music-grid');
            grid.innerHTML = "";
            list.forEach(s => {
                grid.innerHTML += `
                    <div class="song-card">
                        <img src="${s.cover}">
                        <h4>${s.jina}</h4>
                        <p style="font-size:10px; color:#1DB954;">FULL HD AUDIO</p>
                        <button class="buy-tzs" onclick="pay('${s.jina}', '${s.link}', 'TZS')">LIPA TZS 13,500</button>
                        <button class="buy-usd" onclick="pay('${s.jina}', '${s.link}', 'USD')">PAY $5.00</button>
                    </div>
                `;
            });
        }

        function filterSongs() {
            const val = document.getElementById('search').value.toLowerCase();
            const filtered = storeData.filter(s => s.jina.toLowerCase().includes(val));
            display(filtered);
        }

        function pay(name, url, type) {
            let msg = type === 'TZS' ? 
                `UNANUNUA: ${name}\nLIPA TZS 13,500 KWA:\nNamba: 0621645957\nJina: DANIEL RICHARD\n\nWeka ID ya muamala kuanza download:` :
                `BUYING: ${name}\nSEND $5.00 TO:\nName: DANIEL RICHARD\nNumber: +255621645957\n\nEnter Transaction ID:`;
            
            let id = prompt(msg);
            if(id && id.length > 5) {
                alert("Asante Daniel Richard amethibitisha malipo. Download inaanza sasa!");
                const a = document.createElement('a');
                a.href = url;
                a.download = name + ".mp3";
                a.click();
            }
        }

        display(storeData);
    </script>
</body>
</html>
