<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Music Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .header { margin-bottom: 30px; }
        h1 { color: #1DB954; font-size: 2.5rem; margin-bottom: 5px; }
        .search-box { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; }
        input { padding: 15px; width: 60%; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button { padding: 15px 30px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 20px; padding: 10px; }
        .card { background: #181818; padding: 15px; border-radius: 15px; transition: 0.3s; }
        .card:hover { background: #282828; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 5px 0; color: #fff; height: 35px; overflow: hidden; }
        .pay-btn { background: #1DB954; border: none; color: white; padding: 10px; width: 100%; border-radius: 20px; font-size: 12px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>World Music Pro</h1>
        <p>Search, Pay & Download Global Hits</p>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Andika jina la wimbo au msanii...">
        <button onclick="tafutaMuziki()">Search</button>
    </div>

    <div id="results">
        </div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');

            if (!query) {
                alert("Tafadhali andika jina la wimbo!");
                return;
            }

            container.innerHTML = "<p>Inatafuta muziki wa " + query + "... Tafadhali subiri.</p>";

            try {
                // Tunatumia iTunes API kwa sababu ni rahisi na haina malipo ya kuanza
                const url = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=12`;
                const response = await fetch(url);
                const data = await response.json();

                container.innerHTML = ""; // Futa meseji ya "Inatafuta"

                if (data.results.length === 0) {
                    container.innerHTML = "<p>Pole, hakuna wimbo uliopatikana. Jaribu jina lingine.</p>";
                    return;
                }

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <p style="font-size:12px; color:#b3b3b3;">${song.artistName}</p>
                        <button class="pay-btn" onclick="fanyaMalipo('${song.trackName.replace(/'/g, "")}', '${song.previewUrl}')">
                            Download (500/=)
                        </button>
                    `;
                    container.appendChild(card);
                });
            } catch (error) {
                console.error(error);
                container.innerHTML = "<p>Tatizo la mtandao! Hakikisha uwashe data na ujaribu tena.</p>";
            }
        }

        function fanyaMalipo(jina, link) {
            const namba = prompt("Andika namba yako ya M-PESA/TIGO PESA kuanza malipo ya " + jina + ":");
            
            if (namba && namba.length >= 10) {
                alert("Ombi limetumwa kwa namba: " + namba + ". Subiri ujumbe wa namba ya siri kisha weka PIN kukamilisha.");
                
                // Hapa tunajifanya malipo yamekamilika baada ya sekunde 3 (Simulation)
                setTimeout(() => {
                    alert("Malipo Yamefanikiwa! Wimbo unaanza kupakuliwa sasa.");
                    window.location.href = link; 
                }, 4000);
            } else if (namba) {
                alert("Namba hiyo sio sahihi. Jaribu tena.");
            }
        }
    </script>
</body>
</html>
