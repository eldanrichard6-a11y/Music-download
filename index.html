<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Pro Player</title>
   <link rel="manifest" href="manifest.json">
   <link rel="icon" type="image/png" href="icon.png">
   <meta name="theme-color" content="#00f2fe">
   <meta name="apple-mobile-web-app-capable" content="yes">
   
    <style>
        /* CSS - Muonekano wa Kisasa */
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            background-color: var(--dark-bg);
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
        }

        h1 {
            text-align: center;
            background: linear-gradient(to right, var(--primary), var(--secondary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }

        /* Search Bar */
        .search-area {
            position: sticky;
            top: 10px;
            z-index: 100;
            display: flex;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 8px;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 15px;
            color: white;
            font-size: 16px;
            outline: none;
        }

        button#searchBtn {
            background: linear-gradient(to right, var(--secondary), var(--primary));
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            color: #0f172a;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button#searchBtn:active { transform: scale(0.9); }

        /* Music Cards */
        .results-list {
            display: grid;
            gap: 15px;
        }

        .music-card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 15px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: 0.3s;
            animation: slideUp 0.4s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .music-card:hover { background: rgba(255, 255, 255, 0.1); }

        .album-art {
            width: 70px;
            height: 70px;
            border-radius: 15px;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .details { flex: 1; overflow: hidden; }
        .track-name { font-weight: bold; font-size: 16px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .artist-name { font-size: 13px; color: #94a3b8; }

        .controls {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .play-btn {
            background: var(--primary);
            color: #0f172a;
            border: none;
            padding: 8px;
            border-radius: 50%;
            width: 35px;
            height: 35px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }

        .dl-link {
            text-decoration: none;
            color: var(--secondary);
            font-size: 11px;
            font-weight: bold;
            text-align: center;
            border: 1px solid var(--secondary);
            padding: 4px 8px;
            border-radius: 5px;
        }

        #status { text-align: center; color: var(--secondary); margin: 10px; font-style: italic; }

        /* Custom Audio Player Bottom */
        audio {
            width: 100%;
            height: 30px;
            margin-top: 10px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5);
        }
    </style>
</head>
<body>

<div class="app-container">
    <h1>Melody Pro</h1>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Tafuta wimbo au msanii...">
        <button id="searchBtn" onclick="findMusic()">Search</button>
    </div>

    <div id="status"></div>
    <div class="results-list" id="results">
        </div>
</div>

<script>
    async function findMusic() {
        const query = document.getElementById('searchInput').value;
        const resultsArea = document.getElementById('results');
        const status = document.getElementById('status');

        if (!query) return;

        resultsArea.innerHTML = '';
        status.innerText = "Inatafuta nyimbo bora kabisa...";

        try {
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20`);
            const data = await response.json();
            status.innerText = "";

            if (data.results.length === 0) {
                status.innerText = "Samahani, wimbo haujapatikana.";
                return;
            }

            data.results.forEach((song, index) => {
                const card = document.createElement('div');
                card.className = 'music-card';
                card.style.animationDelay = (index * 0.1) + "s";
                
                card.innerHTML = `
                    <img class="album-art" src="${song.artworkUrl100}" alt="cover">
                    <div class="details">
                        <span class="track-name">${song.trackName}</span>
                        <span class="artist-name">${song.artistName}</span>
                        <audio controls>
                            <source src="${song.previewUrl}" type="audio/mpeg">
                        </audio>
                    </div>
                    <div class="controls">
                        <a href="${song.previewUrl}" download="${song.trackName}.mp3" class="dl-link">MP3</a>
                    </div>
                `;
                resultsArea.appendChild(card);
            });
        } catch (err) {
            status.innerText = "Tatizo la mtandao! Jaribu tena.";
        }
    }

    // Enter Key support
    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') findMusic();
    });
</script>

</body>
</html>
