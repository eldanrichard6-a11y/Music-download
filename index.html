<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Daniel Store</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .buy-text { color: #ffc107; font-weight: bold; font-size: 14px; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        h1 { color: #1DB954; font-size: 2.5rem; margin: 0; }
        
        /* Mitandao ya Jamii na Mawasiliano */
        .contact-bar { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .icon-btn { padding: 10px; border-radius: 50%; border: none; cursor: pointer; width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; }
        .whatsapp { background: #25D366; }
        .facebook { background: #1877F2; }
        .call { background: #ffc107; }

        .search-box { margin: 25px 0; }
        input { padding: 15px; width: 80%; border-radius: 30px; border: none; background: #222; color: white; outline: none; border: 1px solid #333; }
        
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #121212; padding: 15px; border-radius: 15px; border: 1px solid #282828; }
        .card img { width: 100%; border-radius: 10px; height: 180px; object-fit: cover; }
        
        .btn-pay { background: #1DB954; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; }
        
        .share-main { background: #ffffff; color: #000; padding: 10px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; margin-top: 10px; border: none; }
    </style>
</head>
<body>

    <span class="buy-text">BUY AND ENJOY FULL SONGS</span>
    <h1>Code Pro</h1>

    <div class="contact-bar">
        <a href="tel:0621645957" class="icon-btn call" title="Piga Simu">📞</a>
        <a href="https://wa.me/255621645957?text=Habari%20Daniel%2C%20nahitaji%20muziki%20kutoka%20Code%20Pro" class="icon-btn whatsapp" title="WhatsApp">💬</a>
        <button onclick="shareFB()" class="icon-btn facebook" title="Share Facebook">F</button>
    </div>

    <button onclick="shareApp()" class="share-main">SHARE APP WITH FRIENDS</button>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tafuta wimbo dukani kwangu..." onkeyup="tafutaDukani()">
    </div>

    <div id="results"></div>

    <script>
        // HAPA NDIPO UNAPOWEKA NYIMBO ZAKO FULL
        // JINSI YA KUWEKA: Ongeza wimbo hapa chini, hakikisha file lipo kwenye folder la 'nyimbo'
        const nyimboZangu = [
            {
                jina: "Migos - Stir Fry",
                msanii: "Migos",
                picha: "https://images.alphacoders.com/901/901438.jpg",
                file: "nyimbo/stir-fry.mp3" 
            },
            {
                jina: "Cardi B - Money",
                msanii: "Cardi B",
                picha: "https://m.media-amazon.com/images/I/71rVlF8u+OL._SS500_.jpg",
                file: "nyimbo/money.mp3"
            },
            {
                jina: "Diamond Platnumz - Shu!",
                msanii: "Diamond",
                picha: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_xV9D6M9B9X9D6M9B9X9D6M9B9X9D6M9B9X9",
                file: "nyimbo/diamond.mp3"
            }
        ];

        function onyeshaNyimbo(data) {
            const container = document.getElementById('results');
            container.innerHTML = "";
            data.forEach(song => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${song.picha}" alt="cover">
                    <h3>${song.jina}</h3>
                    <p style="font-size:12px; color:#aaa;">Full Track - High Quality</p>
                    <button class="btn-pay" onclick="lipia('${song.jina}', '${song.file}', 'TZS')">BUY FULL SONG (TZS 13,500)</button>
                    <button class="btn-usd" onclick="lipia('${song.jina}', '${song.file}', 'USD')">BUY FULL SONG ($5.00)</button>
                `;
                container.appendChild(card);
            });
        }

        function tafutaDukani() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = nyimboZangu.filter(s => s.jina.toLowerCase().includes(query));
            onyeshaNyimbo(filtered);
        }

        function lipia(wimbo, wimboUrl, fedha) {
            let msg = fedha === 'TZS' ? 
                `UNANUNUA WIMBO MZIMA: ${wimbo}\n\nLipa TZS 13,500 kwa:\nNamba: 0621645957\nJina: DANIEL RICHARD\n\nIngiza Transaction ID hapa kuanza download:` :
                `BUYING FULL TRACK: ${wimbo}\n\nSend $5.00 via WorldRemit to:\nNumber: +255 621 645 957\nName: DANIEL RICHARD\n\nEnter Transaction Reference ID:`;
            
            let id = prompt(msg);
            if (id && id.length > 5) {
                alert("Malipo Yamethibitishwa! Wimbo wako unapakuliwa sasa...");
                const a = document.createElement('a');
                a.href = wimboUrl;
                a.download = wimbo + ".mp3";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        // Kazi za Kushare
        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'Code Pro Music',
                    text: 'Pakua nyimbo kali na mpya hapa!',
                    url: window.location.href
                });
            } else {
                alert("Copy link hii: " + window.location.href);
            }
        }

        function shareFB() {
            window.open('https://www.facebook.com/sharer/sharer.php?u=' + encodeURIComponent(window.location.href), '_blank');
        }

        onyeshaNyimbo(nyimboZangu);
    </script>
</body>
</html>
