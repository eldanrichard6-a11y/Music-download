<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Pro - Music Downloader</title>
    
    <meta name="google-site-verification" content="WEKA_KODI_YAKO_HAPA" />

    <meta name="description" content="Melody Pro - Pakua na usikilize muziki mpya kwa haraka na bure. Programu bora ya Eldan Richard.">
    <meta name="keywords" content="music downloader, download nyimbo, muziki mpya, Melody Pro, Eldan Richard">
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00f2fe">

    <style>
        :root {
            --primary: #00f2fe;
            --dark-bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }
        .container { width: 100%; max-width: 480px; }
        h1 { text-align: center; color: var(--primary); }
        
        .search-box {
            display: flex;
            background: var(--glass);
            padding: 10px;
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            margin-bottom: 20px;
        }
        input { flex: 1; background: transparent; border: none; color: white; padding: 10px; outline: none; }
        button { background: var(--primary); border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer; }

        .music-card {
            background: var(--glass);
            margin-bottom: 15px;
            padding: 15px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        audio { width: 100%; height: 35px; }
        .dl-btn {
            background: #22c55e;
            color: white;
            text-decoration: none;
            text-align: center;
            padding: 8px;
            border-radius: 8px;
            font-size: 14px;
        }
        /* AD SPACE */
        .ad-space { margin-top: 20px; text-align: center; min-height: 50px; background: rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<div class="container">
    <h1>Melody Pro</h1>
    
    <div class="search-box">
        <input type="text" id="query" placeholder="Tafuta wimbo/msanii...">
        <button onclick="search()">Search</button>
    </div>

    <div id="results"></div>

    <div class="ad-space">
        <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-app-pub-978808XXXXXXXXXX" crossorigin="anonymous"></script>
        <ins class="adsbygoogle" style="display:inline-block;width:320px;height:50px" data-ad-client="ca-app-pub-978808XXXXXXXXXX" data-ad-slot="YYYYYYYYYY"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    </div>
</div>

<script>
    async function search() {
        const q = document.getElementById('query').value;
        const res = document.getElementById('results');
        if (!q) return;
        res.innerHTML = "Inatafuta...";
        
        try {
            const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(q)}&entity=song&limit=15`);
            const data = await response.json();
            res.innerHTML = "";
            data.results.forEach(song => {
                res.innerHTML += `
                    <div class="music-card">
                        <strong>${song.trackName}</strong>
                        <small>${song.artistName}</small>
                        <audio controls src="${song.previewUrl}"></audio>
                        <a href="${song.previewUrl}" download class="dl-btn">DOWNLOAD MP3</a>
                    </div>`;
            });
        } catch (e) { res.innerHTML = "Tatizo la mtandao!"; }
    }
</script>

</body>
</html>
