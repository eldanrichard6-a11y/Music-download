<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melody Pro</title>
    
    <meta name="google-site-verification" content="Apib7-x98H0j5cPqHWwSMm6dNU4GmODRoqxLiDzdx9I" />

    <style>
        .search-container {
    display: flex;
    gap: 10px;
    margin: 20px;
}

#searchInput {
    flex: 1;
    padding: 10px;
    border-radius: 5px;
    border: 1px solid #ccc;
}

button {
    padding: 10px 20px;
    background-color: #1DB954;
    color: white;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 50px; }
    </style>
</head>
<body>
    <div class="search-container">
    <input type="text" id="searchInput" placeholder="Tafuta wimbo au msanii...">
    <button onclick="searchMusic()">Tafuta</button>
</div>

<div id="results">
    </div>

    <h1>Melody Pro imeshakuwa Verified!</h1>
    <p>App ya Eldan Richard sasa iko tayari.</p>
    <script>
    function searchMusic() {
    let query = document.getElementById('searchInput').value;
    let resultsDiv = document.getElementById('results');

    if (query === "") {
        alert("Tafadhali andika jina la wimbo!");
        return;
    }

    resultsDiv.innerHTML = "<p>Inatafuta...</p>";

    // Mfano wa kutafuta kutumia API ya bure (iTunes API)
    fetch(`https://itunes.apple.com/search?term=${query}&media=music&limit=10`)
    .then(response => response.json())
    .then(data => {
        resultsDiv.innerHTML = "";
        data.results.forEach(song => {
            resultsDiv.innerHTML += `
                <div style="border-bottom: 1px solid #eee; padding: 10px;">
                    <strong>${song.trackName}</strong> - ${song.artistName} <br>
                    <audio controls src="${song.previewUrl}"></audio>
                </div>
            `;
        });
    })
    .catch(error => {
        resultsDiv.innerHTML = "<p>Imeshindikana kupata nyimbo. Jaribu tena.</p>";
    });
}
    </script>
</body>
</html>
