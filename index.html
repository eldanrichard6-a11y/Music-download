<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Music & Code Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #1DB954; font-size: 2.2rem; }
        .search-box { margin: 25px 0; }
        input { padding: 15px; width: 60%; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button#search-btn { padding: 15px 25px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        
        /* Sehemu ya Code Tags */
        .code-tags { margin-top: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tag { background: #333; padding: 5px 15px; border-radius: 15px; font-size: 12px; color: #1DB954; border: 1px solid #1DB954; cursor: pointer; }

        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #181818; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 8px; }
        .pay-options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        
        /* Vitufe vya Selcom & International */
        .btn-selcom { background: #e31b23; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <h1>World Music & Code Pro 🎵💻</h1>
    <p>Premium Hits - $5.00 / TZS 13,500</p>

    <div class="code-tags">
        <span class="tag" onclick="onyeshaKodi('Python')">Python</span>
        <span class="tag" onclick="onyeshaKodi('C#')">C#</span>
        <span class="tag" onclick="onyeshaKodi('C++')">C++</span>
        <span class="tag" onclick="onyeshaKodi('Swift')">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search song or artist...">
        <button id="search-btn" onclick="tafutaMuziki()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        // 1. TAFUTA MUZIKI
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Andika jina la wimbo!");

            container.innerHTML = "<p>Connecting to servers...</p>";

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=12`);
                const data = await response.json();
                container.innerHTML = "";

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <div class="pay-options">
                            <button class="btn-selcom" onclick="lipiaSelcom('${song.trackName}')">Lipa TZS 13,500 (Selcom)</button>
                            <button class="btn-usd" onclick="lipiaInternational('${song.trackName}')">Pay USD $5.00 (Global)</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Network Error!"; }
        }

        // 2. MFUMO WA SELCOM (Push to Mobile)
        function lipiaSelcom(wimbo) {
            let namba = prompt("Selcom Checkout: Weka namba yako (M-Pesa/Tigo/Airtel):");
            if(namba && namba.length >= 10) {
                alert("Selcom inatuma ombi la TZS 13,500 kwenda " + namba + ". Tafadhali weka PIN yako kwenye simu.");
                // Hapa ndipo utakapoweka 'Vendor ID' yako ya Selcom baada ya activation kukamilika
                setTimeout(() => {
                    alert("Malipo ya Selcom Yamehakikiwa! " + wimbo + " inapakuliwa sasa.");
                }, 4000);
            }
        }

        // 3. MALIPO YA KIMATAIFA (USD)
        function lipiaInternational(wimbo) {
            let kadi = prompt("International Payment: Enter Card Details ($5.00):");
            if(kadi) {
                alert("Authorizing $5.00 payment for " + wimbo + ". Please wait...");
                setTimeout(() => alert("Verified! High-quality download started."), 4000);
            }
        }

        // 4. KIASHIRIA CHA LUGHA ZA PROGRAMU (Mifano)
        function onyeshaKodi(lugha) {
            if(lugha === 'Python') alert("Python Code Example: print('Hello World')");
            if(lugha === 'C++') alert("C++ Code Example: cout << 'Hello World';");
            if(lugha === 'Swift') alert("Swift Code: print('Hello World')");
            if(lugha === 'C#') alert("C# Code: Console.WriteLine('Hello World');");
        }
    </script>
</body>
</html>
