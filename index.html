<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro Music - Global Premium</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #1DB954; font-size: 2.2rem; }
        .tag { background: #333; padding: 5px 12px; border-radius: 15px; font-size: 11px; color: #1DB954; border: 1px solid #1DB954; margin: 2px; display: inline-block; }
        input { padding: 15px; width: 65%; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button#search-btn { padding: 15px 25px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #181818; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 8px; }
        .btn-pay { background: #1DB954; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Code Pro 🎵💻</h1>
    <div class="code-tags">
        <span class="tag">Python</span><span class="tag">C#</span><span class="tag">C++</span><span class="tag">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search millions of songs...">
        <button id="search-btn" onclick="tafutaMuziki()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Search a song!");

            container.innerHTML = "Searching millions of hits...";

            try {
                // Hii API inakupa mamilioni ya nyimbo duniani kote
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=20`);
                const data = await response.json();
                container.innerHTML = "";

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <button class="btn-pay" onclick="lipia('${song.trackName}', '${song.previewUrl}', 'TZS')">Lipa TZS 13,500</button>
                        <button class="btn-usd" onclick="lipia('${song.trackName}', '${song.previewUrl}', 'USD')">Pay USD $5.00</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Error connecting to servers."; }
        }

        function lipia(wimbo, downloadUrl, fedha) {
            let ujumbe = fedha === 'TZS' ? 
                `LIPA TZS 13,500 kwa ${wimbo}\nTuma kwenda: 0621645957\nKisha weka namba ya muamala hapa:` :
                `PAY $5.00 for ${songName}\nSend via WorldRemit to: +255 621 645 957\nEnter Transaction ID:`;
            
            let id = prompt(ujumbe);

            if (id && id.length > 5) {
                alert("Payment Verified! Your download is starting now...");
                
                // HII NDIO SEHEMU YA KU-DOWNLOAD AUTOMATIC
                const link = document.createElement('a');
                link.href = downloadUrl;
                link.download = wimbo + ".m4a";
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            }
        }
    </script>
</body>
</html>
