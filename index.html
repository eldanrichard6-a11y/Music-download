<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro Music - Global Streaming</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #1DB954; font-size: 2.2rem; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tag { background: #333; padding: 5px 12px; border-radius: 15px; font-size: 11px; color: #1DB954; border: 1px solid #1DB954; margin: 2px; display: inline-block; }
        input { padding: 15px; width: 65%; border-radius: 30px; border: none; background: #222; color: white; outline: none; margin-bottom: 10px; }
        button#search-btn { padding: 15px 25px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #181818; padding: 15px; border-radius: 12px; border: 1px solid #333; transition: 0.3s; }
        .card:hover { transform: scale(1.02); background: #252525; }
        .card img { width: 100%; border-radius: 8px; margin-bottom: 10px; }
        .card h3 { font-size: 14px; margin: 10px 0; height: 35px; overflow: hidden; }
        audio { width: 100%; margin: 10px 0; height: 30px; }
        .btn-pay { background: #1DB954; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 10px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1><img src="icon.jpg" width="45" style="border-radius: 50%;"> Code Pro🎵</h1>
    <div class="code-tags">
        <span class="tag">Python</span><span class="tag">C#</span><span class="tag">C++</span><span class="tag">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Tafuta mamilioni ya nyimbo duniani...">
        <br>
        <button id="search-btn" onclick="tafutaMuziki()">Search Music</button>
    </div>

    <div id="results"></div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Tafadhali andika jina la wimbo au msanii!");

            container.innerHTML = "<p>Inatafuta kwenye seva za kimataifa...</p>";

            try {
                // Tunatumia iTunes API kupata mamilioni ya nyimbo
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=24`);
                const data = await response.json();
                container.innerHTML = "";

                if (data.results.length === 0) {
                    container.innerHTML = "<p>Hakuna matokeo yaliyopatikana.</p>";
                    return;
                }

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const cleanTrackName = song.trackName.replace(/'/g, "");
                    
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <p style="font-size: 11px; color: #aaa;">${song.artistName}</p>
                        <audio controls controlsList="nodownload">
                            <source src="${song.previewUrl}" type="audio/mpeg">
                        </audio>
                        <button class="btn-pay" onclick="lipia('${cleanTrackName}', '${song.previewUrl}', 'TZS')">Lipa TZS 13,500</button>
                        <button class="btn-usd" onclick="lipia('${cleanTrackName}', '${song.previewUrl}', 'USD')">Pay USD $5.00</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { 
                container.innerHTML = "<p>Hitilafu! Angalia internet yako.</p>"; 
            }
        }

        function lipia(wimbo, downloadUrl, fedha) {
            let maelezo;
            if (fedha === 'TZS') {
                maelezo = `MALIPO YA: ${wimbo}\n\nLipa TZS 13,500 kwenda:\nNamba: 0621645957\nJina: Eldan Richard\n\nWeka Transaction ID hapa:`;
            } else {
                maelezo = `PAYMENT FOR: ${wimbo}\n\nSend $5.00 via WorldRemit/Sendwave to:\nNumber: +255 621 645 957\nName: Eldan Richard\n\nEnter Transaction Reference:`;
            }
            
            let id = prompt(maelezo);

            if (id && id.length > 5) {
                alert("Malipo Yamethibitishwa! Wimbo unaanza kupakuliwa...");
                
                // MFUMO WA AUTO-DOWNLOAD
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${wimbo}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }
    </script>
</body>
</html>
