<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Buy and Enjoy</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .buy-text { color: #ffc107; font-weight: bold; font-size: 14px; letter-spacing: 2px; display: block; margin-bottom: 10px; }
        h1 { color: #1DB954; font-size: 2.5rem; margin: 0; }
        .tag { background: #1a1a1a; padding: 5px 12px; border-radius: 15px; font-size: 11px; color: #1DB954; border: 1px solid #1DB954; }
        input { padding: 15px; width: 75%; border-radius: 30px; border: none; background: #222; color: white; outline: none; margin-bottom: 15px; border: 1px solid #333; }
        button#search-btn { padding: 15px 35px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; font-size: 16px; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #121212; padding: 15px; border-radius: 15px; border: 1px solid #282828; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 12px; }
        audio { width: 100%; height: 35px; margin-bottom: 15px; filter: invert(100%); }
        .btn-pay { background: #1DB954; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <span class="buy-text">BUY AND ENJOY</span>
    <h1>Code Pro</h1>

    <div class="code-tags">
        <span class="tag">Python</span><span class="tag">C#</span><span class="tag">C++</span><span class="tag">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search billions of songs...">
        <button id="search-btn" onclick="tafutaMuziki()">SEARCH MUSIC</button>
    </div>

    <div id="results"></div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Search a song!");

            container.innerHTML = "<p>Connecting to global music servers...</p>";

            try {
                // Inapata mabilioni ya nyimbo duniani kote
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=30`);
                const data = await response.json();
                container.innerHTML = "";

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const cleanTrackName = song.trackName.replace(/'/g, "");
                    
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '600x600')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <p style="font-size:12px; color:#aaa;">${song.artistName}</p>
                        <p style="font-size:10px; color:#ffc107;">Preview Mode (30s)</p>
                        <audio controls>
                            <source src="${song.previewUrl}" type="audio/mpeg">
                        </audio>
                        <button class="btn-pay" onclick="lipia('${cleanTrackName}', '${song.previewUrl}', 'TZS')">BUY FULL SONG (TZS 13,500)</button>
                        <button class="btn-usd" onclick="lipia('${cleanTrackName}', '${song.previewUrl}', 'USD')">BUY FULL SONG ($5.00)</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Network error!"; }
        }

        function lipia(wimbo, previewUrl, fedha) {
            let msg = fedha === 'TZS' ? 
                `BUY FULL VERSION: ${wimbo}\n\nSend TZS 13,500 to:\n0621645957 (Eldan Richard)\nThen enter Transaction ID to unlock full download:` :
                `BUY FULL VERSION: ${wimbo}\n\nSend $5.00 via WorldRemit to: +255 621 645 957\nEnter Transaction ID:`;
            
            let id = prompt(msg);

            if (id && id.length > 5) {
                alert("Payment Verified! The full track is being prepared for download...");
                
                // Mfumo wa auto-download
                const a = document.createElement('a');
                a.href = previewUrl; 
                a.download = `${wimbo}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }
    </script>
</body>
</html>
