<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Daniel Richard Store</title>
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
        /* Muonekano wa Kisasa na Kodi za Python Background */
        body { 
            font-family: 'Consolas', 'Monaco', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            text-align: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Mapambo ya kodi za Python */
        body::before {
            content: "def play_music():\n    print('Loading...')\n    import os\n    os.system('play full_song.mp3')\n\nwhile True:\n    if payment == 'Verified':\n        download_start()\n    else:\n        prompt_id()";
            position: fixed;
            top: 10px;
            left: 10px;
            color: rgba(29, 185, 84, 0.05);
            font-size: 14px;
            text-align: left;
            white-space: pre;
            z-index: -1;
        }

        .buy-text { color: #ffc107; font-weight: bold; font-size: 14px; letter-spacing: 3px; display: block; margin-bottom: 10px; }
        h1 { color: #1DB954; font-size: 3rem; margin: 0; text-shadow: 0 0 10px rgba(29, 185, 84, 0.3); }
        
        /* Mawasiliano Bar */
        .contact-bar { display: flex; justify-content: center; gap: 20px; margin: 25px 0; }
        .icon-btn { 
            width: 50px; height: 50px; border-radius: 50%; border: none; 
            display: flex; align-items: center; justify-content: center; 
            text-decoration: none; font-size: 20px; transition: 0.3s;
        }
        .whatsapp { background: #25D366; color: white; }
        .call { background: #ffc107; color: black; }
        .share-btn { background: #ffffff; color: black; }
        .icon-btn:hover { transform: scale(1.1); }

        .search-box { margin: 30px 0; }
        input { 
            padding: 18px; width: 85%; max-width: 500px; border-radius: 30px; 
            border: 1px solid #333; background: #111; color: white; outline: none; 
            font-size: 16px;
        }
        
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 25px; margin-top: 30px; }
        .card { 
            background: rgba(18, 18, 18, 0.8); padding: 20px; border-radius: 20px; 
            border: 1px solid #282828; backdrop-filter: blur(5px);
            transition: 0.3s;
        }
        .card:hover { border-color: #1DB954; box-shadow: 0 0 20px rgba(29, 185, 84, 0.2); }
        .card img { width: 100%; border-radius: 15px; height: 200px; object-fit: cover; }
        
        .btn-pay { 
            background: #1DB954; color: white; border: none; padding: 14px; 
            border-radius: 10px; width: 100%; margin-top: 15px; cursor: pointer; 
            font-weight: bold; transition: 0.3s;
        }
        .btn-usd { 
            background: #ffc107; color: black; border: none; padding: 14px; 
            border-radius: 10px; width: 100%; margin-top: 10px; cursor: pointer; 
            font-weight: bold;
        }
        .btn-pay:hover, .btn-usd:hover { opacity: 0.8; }
    </style>
</head>
<body>

    <span class="buy-text">BUY AND ENJOY FULL SONGS</span>
    <h1>Code Pro</h1>

    <div class="contact-bar">
        <a href="tel:0621645957" class="icon-btn call" title="Piga Simu Daniel">📞</a>
        <a href="https://wa.me/255621645957?text=Habari%20Daniel%20Richard%2C%20nahitaji%20muziki%20full" class="icon-btn whatsapp" title="WhatsApp Daniel">💬</a>
        <button onclick="shareApp()" class="icon-btn share-btn" title="Share App">🔗</button>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search premium music..." onkeyup="tafutaDukani()">
    </div>

    <div id="results"></div>

    <script>
        // ORODHA YA NYIMBO ZAKO (FULL TRACKS)
        const nyimboZangu = [
            {
                jina: "Migos - Stir Fry",
                msanii: "Migos",
                picha: "https://images.alphacoders.com/901/901438.jpg",
                file: "nyimbo/stir-fry.mp3" 
            },
            {
                jina: "Cardi B - Money",
                msanii: "Cardi B",
                picha: "https://m.media-amazon.com/images/I/71rVlF8u+OL._SS500_.jpg",
                file: "nyimbo/money.mp3"
            },
            {
                jina: "Diamond Platnumz - Shu!",
                msanii: "Diamond",
                picha: "https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcR_xV9D6M9B9X9D6M9B9X9D6M9B9X9D6M9B9X9",
                file: "nyimbo/diamond.mp3"
            }
        ];

        function onyeshaNyimbo(data) {
            const container = document.getElementById('results');
            container.innerHTML = "";
            data.forEach(song => {
                const card = document.createElement('div');
                card.className = 'card';
                card.innerHTML = `
                    <img src="${song.picha}" alt="cover">
                    <h3 style="font-size:16px;">${song.jina}</h3>
                    <p style="font-size:11px; color:#1DB954;">✓ High Quality Full Song</p>
                    <button class="btn-pay" onclick="lipia('${song.jina}', '${song.file}', 'TZS')">BUY FULL SONG (TZS 13,500)</button>
                    <button class="btn-usd" onclick="lipia('${song.jina}', '${song.file}', 'USD')">BUY FULL SONG ($5.00)</button>
                `;
                container.appendChild(card);
            });
        }

        function tafutaDukani() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = nyimboZangu.filter(s => s.jina.toLowerCase().includes(query));
            onyeshaNyimbo(filtered);
        }

        function lipia(wimbo, wimboUrl, fedha) {
            let msg = fedha === 'TZS' ? 
                `UNANUNUA WIMBO MZIMA: ${wimbo}\n\nLipa TZS 13,500 kwenda:\nNamba: 0621645957\nJina: DANIEL RICHARD\n\nWeka Transaction ID hapa kuanza download:` :
                `BUYING FULL TRACK: ${wimbo}\n\nSend $5.00 via WorldRemit to:\nNumber: +255 621 645 957\nName: DANIEL RICHARD\n\nEnter Transaction Reference ID:`;
            
            let id = prompt(msg);
            if (id && id.length > 5) {
                alert("Malipo Yamethibitishwa! Wimbo wako unapakuliwa sasa...");
                const a = document.createElement('a');
                a.href = wimboUrl;
                a.download = wimbo + ".mp3";
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }

        function shareApp() {
            if (navigator.share) {
                navigator.share({
                    title: 'Code Pro - Daniel Richard Store',
                    text: 'Pata mamilioni ya nyimbo kali hapa!',
                    url: window.location.href
                });
            } else {
                alert("Nakili link hii: " + window.location.href);
            }
        }

        onyeshaNyimbo(nyimboZangu);
    </script>
</body>
</html>
