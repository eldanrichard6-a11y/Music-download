<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Buy and Enjoy</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/jpeg" href="icon.jpg">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        
        /* Sehemu ya juu iliyoboreshwa */
        .header-top { margin-bottom: 20px; }
        .buy-text { color: #ffc107; font-weight: bold; font-size: 14px; letter-spacing: 2px; display: block; margin-bottom: 5px; }
        h1 { color: #1DB954; font-size: 2.5rem; margin: 0; display: flex; align-items: center; justify-content: center; gap: 15px; }
        h1 img { border-radius: 50%; border: 2px solid #1DB954; }

        .code-tags { margin: 15px 0; display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; }
        .tag { background: #1a1a1a; padding: 5px 12px; border-radius: 15px; font-size: 11px; color: #1DB954; border: 1px solid #1DB954; }

        .search-box { margin: 25px 0; }
        input { padding: 15px; width: 70%; border-radius: 30px; border: none; background: #222; color: white; outline: none; margin-bottom: 15px; border: 1px solid #333; }
        button#search-btn { padding: 15px 35px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        button#search-btn:hover { background: #1ed760; transform: translateY(-2px); }

        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #121212; padding: 15px; border-radius: 15px; border: 1px solid #282828; transition: 0.3s; }
        .card:hover { border-color: #1DB954; background: #181818; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .card h3 { font-size: 14px; margin: 10px 0 5px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .card p { font-size: 12px; color: #b3b3b3; margin-bottom: 10px; }
        
        audio { width: 100%; height: 35px; margin-bottom: 15px; filter: invert(100%) hue-rotate(90deg) brightness(1.5); }

        .btn-pay { background: #1DB954; color: white; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 5px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 12px; border-radius: 8px; width: 100%; margin-top: 8px; cursor: pointer; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-top">
        <span class="buy-text">BUY AND ENJOY</span>
        <h1>
            <img src="icon.jpg" width="55" height="55" alt="Logo">
            Code Pro
        </h1>
    </div>

    <div class="code-tags">
        <span class="tag">Python</span><span class="tag">C#</span><span class="tag">C++</span><span class="tag">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search millions of premium songs...">
        <br>
        <button id="search-btn" onclick="tafutaMuziki()">SEARCH MUSIC</button>
    </div>

    <div id="results"></div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Please enter a song or artist name!");

            container.innerHTML = "<p style='color:#1DB954'>Connecting to global servers...</p>";

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=30`);
                const data = await response.json();
                container.innerHTML = "";

                if (data.results.length === 0) {
                    container.innerHTML = "<p>No results found. Try another name.</p>";
                    return;
                }

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    const cleanTrackName = song.trackName.replace(/'/g, "");
                    
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '600x600')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <p>${song.artistName}</p>
                        <audio controls controlsList="nodownload">
                            <source src="${song.previewUrl}" type="audio/mpeg">
                        </audio>
                        <button class="btn-pay" onclick="lipia('${cleanTrackName}', '${song.previewUrl}', 'TZS')">LIPA TZS 13,500</button>
                        <button class="btn-usd" onclick="lipia('${cleanTrackName}', '${song.previewUrl}', 'USD')">PAY USD $5.00</button>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { 
                container.innerHTML = "<p>Connection error! Please check your data.</p>"; 
            }
        }

        function lipia(wimbo, downloadUrl, fedha) {
            let instructions;
            if (fedha === 'TZS') {
                instructions = `KUNUNUA: ${wimbo}\n\nLipa TZS 13,500 kwenda:\nNamba: 0621645957\nJina: Eldan Richard\n\nWeka Transaction ID hapa kuanza download:`;
            } else {
                instructions = `CHECKOUT: ${wimbo}\n\nSend $5.00 via WorldRemit/Sendwave to:\nNumber: +255 621 645 957\nName: Eldan Richard\nCountry: Tanzania\n\nEnter Transaction Reference ID:`;
            }
            
            let id = prompt(instructions);

            if (id && id.length > 5) {
                alert("Payment Verified! Your high-quality download is starting...");
                
                const a = document.createElement('a');
                a.href = downloadUrl;
                a.download = `${wimbo}.mp3`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
            }
        }
    </script>
</body>
</html>
