<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Pro - Daniel Richard Music</title>
    <style>
        body { font-family: 'Courier New', monospace; background-color: #050505; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        .python-bg { position: fixed; top: 10px; left: 10px; font-size: 10px; color: rgba(29, 185, 84, 0.15); text-align: left; white-space: pre; pointer-events: none; z-index: -1; }
        h1 { color: #1DB954; font-size: 2.5rem; margin-top: 20px; }
        .owner { color: #ffc107; font-size: 14px; margin-bottom: 20px; letter-spacing: 2px; }
        .contact-box { display: flex; justify-content: center; gap: 15px; margin-bottom: 25px; }
        .c-btn { text-decoration: none; padding: 10px 20px; border-radius: 20px; font-weight: bold; font-size: 13px; }
        .wa { background: #25D366; color: white; }
        .cl { background: #ffc107; color: black; }
        input { padding: 15px; width: 80%; border-radius: 30px; border: 2px solid #1DB954; background: #111; color: white; outline: none; }
        #search-btn { background: #1DB954; color: white; border: none; padding: 15px 30px; border-radius: 30px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 30px; }
        .song-card { background: #121212; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        .song-card img { width: 100%; border-radius: 10px; height: 180px; object-fit: cover; }
        audio { width: 100%; height: 30px; filter: invert(100%); margin: 10px 0; }
        .buy-tzs { background: #1DB954; color: white; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; margin-bottom: 5px; }
        .buy-usd { background: #ffc107; color: black; border: none; padding: 10px; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <div class="python-bg">
def daniel_richard_system():
    music = "Millions of Tracks"
    payment = "DANIEL RICHARD"
    return music
    </div>

    <h1>Code Pro</h1>
    <div class="owner">DANIEL RICHARD PREMIUM STORE</div>

    <div class="contact-box">
        <a href="tel:0621645957" class="c-btn cl">CALL DANIEL</a>
        <a href="https://wa.me/255621645957?text=Habari%20Daniel%2C%20nahitaji%20muziki" class="c-btn wa">WHATSAPP</a>
    </div>

    <input type="text" id="searchInput" placeholder="Search millions of songs...">
    <br>
    <button id="search-btn" onclick="tafutaMuziki()">SEARCH MUSIC</button>

    <div id="results"></div>

    <script>
        function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            if (!query) return alert("Andika jina la wimbo!");

            document.getElementById('results').innerHTML = "<p style='color:#1DB954'>Daniel System: Searching global servers...</p>";

            // Tunatumia JSONP ili kuzuia error za simu (CORS)
            const script = document.createElement('script');
            script.src = `https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=40&callback=handleResponse`;
            document.body.appendChild(script);
            document.body.removeChild(script);
        }

        function handleResponse(data) {
            const container = document.getElementById('results');
            container.innerHTML = "";

            if (data.results.length === 0) {
                container.innerHTML = "<p>Wimbo haujapatikana. Jaribu tena!</p>";
                return;
            }

            data.results.forEach(song => {
                const card = document.createElement('div');
                card.className = 'song-card';
                const track = song.trackName.replace(/'/g, "");
                
                card.innerHTML = `
                    <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                    <h4 style="font-size:14px; margin:10px 0;">${song.trackName}</h4>
                    <p style="font-size:11px; color:#aaa;">${song.artistName}</p>
                    <audio controls><source src="${song.previewUrl}" type="audio/mpeg"></audio>
                    <button class="buy-tzs" onclick="lipia('${track}', 'TZS')">LIPA TZS 13,500</button>
                    <button class="buy-usd" onclick="lipia('${track}', 'USD')">PAY $5.00</button>
                `;
                container.appendChild(card);
            });
        }

        function lipia(wimbo, fedha) {
            let namba = "0621645957";
            let jina = "DANIEL RICHARD";
            let msg = fedha === 'TZS' ? 
                `UNANUNUA: ${wimbo}\nLIPA TZS 13,500 KWENDA:\nNamba: ${namba}\nJina: ${jina}\n\nWeka ID ya muamala hapa:` :
                `BUYING: ${wimbo}\nSEND $5.00 VIA WORLDREMIT TO:\nName: ${jina}\nNumber: +255${namba.substring(1)}\n\nEnter Reference ID:`;
            
            let id = prompt(msg);
            if (id && id.length > 4) {
                alert("Asante! Malipo yamethibitishwa na DANIEL RICHARD.");
            }
        }
    </script>
</body>
</html>
