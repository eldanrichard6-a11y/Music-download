<!DOCTYPE html>
<html lang="sw">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Music & Code Pro</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0b0b0b; color: #ffffff; margin: 0; padding: 20px; text-align: center; }
        h1 { color: #1DB954; font-size: 2.2rem; }
        .search-box { margin: 25px 0; }
        input { padding: 15px; width: 60%; border-radius: 30px; border: none; background: #222; color: white; outline: none; }
        button#search-btn { padding: 15px 25px; border-radius: 30px; border: none; background: #1DB954; color: white; font-weight: bold; cursor: pointer; }
        
        /* Sehemu ya Lugha za Programu */
        .code-tags { margin-top: 10px; display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .tag { background: #333; padding: 5px 15px; border-radius: 15px; font-size: 12px; color: #1DB954; border: 1px solid #1DB954; }

        #results { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; margin-top: 20px; }
        .card { background: #181818; padding: 12px; border-radius: 12px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 8px; }
        .pay-options { display: flex; flex-direction: column; gap: 8px; margin-top: 10px; }
        .btn-usd { background: #ffc107; color: black; border: none; padding: 10px; border-radius: 8px; font-size: 11px; font-weight: bold; cursor: pointer; }
        .btn-tzs { background: #007bff; color: white; border: none; padding: 10px; border-radius: 8px; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>World Music & Code Pro 🎵💻</h1>
    <div class="code-tags">
        <span class="tag">Python</span>
        <span class="tag">C#</span>
        <span class="tag">C++</span>
        <span class="tag">Swift</span>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Search Global Hits...">
        <button id="search-btn" onclick="tafutaMuziki()">Search</button>
    </div>

    <div id="results"></div>

    <script>
        async function tafutaMuziki() {
            const query = document.getElementById('searchInput').value;
            const container = document.getElementById('results');
            if (!query) return alert("Andika jina!");

            container.innerHTML = "<p>Searching...</p>";

            try {
                const response = await fetch(`https://itunes.apple.com/search?term=${encodeURIComponent(query)}&entity=song&limit=12`);
                const data = await response.json();
                container.innerHTML = "";

                data.results.forEach(song => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
                        <img src="${song.artworkUrl100.replace('100x100', '400x400')}" alt="cover">
                        <h3>${song.trackName}</h3>
                        <div class="pay-options">
                            <button class="btn-usd" onclick="lipiaUSD('${song.trackName}')">Pay USD $5.00</button>
                            <button class="btn-tzs" onclick="lipiaTZS('${song.trackName}')">Lipa TZS 13,500</button>
                        </div>
                    `;
                    container.appendChild(card);
                });
            } catch (e) { container.innerHTML = "Error!"; }
        }

        function lipiaUSD(wimbo) {
            let kadi = prompt("International Checkout: Enter Card Number for $5.00 payment:");
            if(kadi) {
                alert("Payment of $5.00 for " + wimbo + " is processing via global gateway...");
                setTimeout(() => alert("Success! Download starting."), 3000);
            }
        }

        function lipiaTZS(wimbo) {
            let namba = prompt("Malipo ya Ndani: Weka namba ya M-Pesa (TZS 13,500):");
            if(namba) alert("Tuma ombi la malipo kwenda " + namba);
        }
    </script>
</body>
</html>
